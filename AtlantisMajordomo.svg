<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"
  viewBox="0 0 512 512" role="img" aria-label="Hexagon with crossed hammer and sword">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#303030" />
      <stop offset="1" stop-color="#f0f0f0" />
    </linearGradient>
  </defs>

  <defs>
    <linearGradient id="h" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7cfc00" />
      <stop offset="1" stop-color="#006400" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="none" />

  <g transform="translate(256,256)">
    <!-- Regular hexagon -->
    <path d="M 220 0 L 110 190.526 L -110 190.526 L -220 0 L -110 -190.526 L 110 -190.526 Z"
     fill="#c0c0c0" stroke="#444444" stroke-width="6" stroke-linejoin="round" />

    <!-- dark green frame -->
    <!-- path d="M 220 0 L 110 190.526 L -110 190.526 L -220 0 L -110 -190.526 L 110 -190.526 Z" fill="#114d2b" stroke="none" / -->
    <path d="M 220 0 L 110 190.526 L -110 190.526 L -220 0 L -110 -190.526 L 110 -190.526 Z" fill="url(#h)" stroke="none" />
    <!-- hexagon background -->
    <path d="M 195 0 L 97.5 169.95 L -97.5 169.95 L -195 0 L -97.5 -169.95 L 97.5 -169.95 Z" fill="url(#g)" stroke="none" />

    <!-- Crossed symbols group -->
    <g transform="translate(0,8) scale(0.98)" stroke="#000000" stroke-width="4"
      stroke-linejoin="round" stroke-linecap="round" fill="#FFFFFF">
      <!-- Hammer group -->
      <g transform="translate(38,-38) rotate(-37) translate(-20,-64)">
        <!-- handle -->
        <rect x="-10" y="-5" width="20" height="190" rx="8" fill="#8b5a2b" />     
        <!-- head -->
        <rect x="-70" y="-46" width="140" height="48" rx="8" fill="#FFFFFF" stroke="#000000" stroke-width="4" />
        <!-- hammer head shadow -->
        <rect x="44" y="-42" width="16" height="36" rx="4" fill="rgba(0,0,0,0.08)" stroke="none" />
      </g>

      <!-- Sword group -->
      <g transform="translate(-4,10) rotate(37)">
        <!-- brown handle -->
        <path d="M8 22 L8 120 L-8 120 L-8 22 Z" fill="#8b5a2b" stroke="#6b3f18" stroke-width="2" />
        <!-- blade and handle outline -->
        <path d="M0 -170 L14 18 L8 22 L8 120 L-8 120 L-8 22 L-14 18 Z M8 22 L8 120 L-8 120 L-8 22 Z"
          fill="#FFFFFF" fill-rule="evenodd" stroke="#000000" stroke-width="4" />
        <!-- guard -->
        <rect x="-54" y="4" width="108" height="14" rx="7" fill="#FFFFFF" stroke="#000000" stroke-width="4" />
        <!-- pommel -->
        <rect x="-12" y="120" width="24" height="32" rx="10" fill="#FFFFFF" stroke="#000000" stroke-width="4" />
      </g>
    </g>
  </g>
</svg>