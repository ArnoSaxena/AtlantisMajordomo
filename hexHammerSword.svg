<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Hexagon with crossed hammer and sword; hammer moved along sword axis so handle sits below blade, not below guard">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d0d0d0"/>
      <stop offset="1" stop-color="#c0c0c0"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#e6e6e6"/>

  <g transform="translate(256,256)">
    <!-- Regular hexagon -->
    <path d="M 220 0 L 110 190.526 L -110 190.526 L -220 0 L -110 -190.526 L 110 -190.526 Z"
          fill="url(#g)" stroke="#444444" stroke-width="6" stroke-linejoin="round"/>

<!-- dark green ring: outer filled hex then cover center with gradient inner hex -->
<path d="M 220 0 L 110 190.526 L -110 190.526 L -220 0 L -110 -190.526 L 110 -190.526 Z"
      fill="#114d2b" stroke="none"/>
<path d="M 195 0 L 97.5 169.95 L -97.5 169.95 L -195 0 L -97.5 -169.95 L 97.5 -169.95 Z"
      fill="url(#g)" stroke="none"/>

    <!-- Inner inset stroke -->
    <path d="M 195 0 L 97.5 169.95 L -97.5 169.95 L -195 0 L -97.5 -169.95 L 97.5 -169.95 Z"
          fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="4" stroke-linejoin="round"/>

    <!-- Crossed symbols group -->
    <g transform="translate(0,8) scale(0.98)" stroke="#000000" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" fill="#FFFFFF">

  <!-- Hammer group: draw brown handle first, then hammer head and outline on top -->
  <g transform="translate(38,-38) rotate(-37) translate(-20,-64)">
    <!-- handle fill -->
    <rect x="-10" y="14" width="20" height="170" rx="8" fill="#8b5a2b" />
    <!-- hammer head and outlines -->
    <rect x="-70" y="-46" width="140" height="48" rx="8"
          fill="#FFFFFF" stroke="#000000" stroke-width="4" />
    <rect x="44" y="-42" width="16" height="36" rx="4" fill="rgba(0,0,0,0.08)" stroke="none"/>
  </g>

  <!-- Sword group: draw blade outline (stroke only) above handle fill, and draw blade fill with inner hole so handle shows through -->
  <g transform="translate(-4,10) rotate(37)">
    <!-- draw brown handle first -->
    <path d="M8 22 L8 120 L-8 120 L-8 22 Z" fill="#8b5a2b" stroke="#6b3f18" stroke-width="2"/>
    <!-- blade fill with a transparent hole for the handle: use two paths — outer blade white, then inner handle-shaped path to punch through via fill-rule -->
    <path d="M0 -170 L14 18 L8 22 L8 120 L-8 120 L-8 22 L-14 18 Z
             M8 22 L8 120 L-8 120 L-8 22 Z"
          fill="#FFFFFF" fill-rule="evenodd" stroke="#000000" stroke-width="4"/>
    <!-- guard (drawn normally) -->
    <rect x="-54" y="4" width="108" height="14" rx="7"
          fill="#FFFFFF" stroke="#000000" stroke-width="4"/>
    <!-- pommel unchanged -->
    <rect x="-12" y="120" width="24" height="32" rx="10"
          fill="#FFFFFF" stroke="#000000" stroke-width="4"/>
  </g>

    </g>
  </g>
</svg>
